<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 780" font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif">
  <rect width="1240" height="780" fill="#f4f6f8"/>

  <!-- 顶部标题 -->
  <text x="620" y="62" text-anchor="middle" font-size="36" font-weight="700" fill="#1a1f26">从 AI 对话里复制一段中文，粘贴出来是这样</text>
  <text x="620" y="104" text-anchor="middle" font-size="22" fill="#6b7684">Claude Code · Codex CLI 的回复，复制到微信 / 文档里</text>

  <!-- ═══ 左卡片：普通复制（脏）═══ -->
  <rect x="55" y="150" width="490" height="470" rx="18" fill="#ffffff" stroke="#e5534b" stroke-width="2.5"/>
  <rect x="55" y="150" width="490" height="58" rx="18" fill="#fdecea"/>
  <rect x="55" y="180" width="490" height="28" fill="#fdecea"/>
  <text x="82" y="188" font-size="25" font-weight="700" fill="#c0362c">✕　直接复制</text>

  <g font-size="24" fill="#2b3038" font-family="'SF Mono','PingFang SC',monospace">
    <text x="80" y="258"><tspan fill="#e5534b" opacity="0.5">··</tspan><tspan fill="#d29922">●</tspan> 这个方案的关键在于我们</text>
    <text x="80" y="298"><tspan fill="#e5534b" opacity="0.5">··</tspan>可以直接复用现成的机制，</text>
    <text x="80" y="338"><tspan fill="#e5534b" opacity="0.5">··</tspan>不需要<tspan fill="#e5534b" font-weight="700">修</tspan></text>
    <text x="80" y="378"><tspan fill="#e5534b" opacity="0.5">··</tspan><tspan fill="#e5534b" font-weight="700">改</tspan>任何设置就能生效。</text>
    <text x="80" y="418" fill="#9aa4b0" font-style="italic">✻ Worked for 11s</text>
  </g>

  <line x1="82" y1="452" x2="518" y2="452" stroke="#f0d4d1" stroke-width="1.5"/>
  <text x="82" y="490" font-size="20" fill="#c0362c">每行多出空格 · 冒出 ● ✻ 怪符号</text>
  <text x="82" y="524" font-size="20" fill="#c0362c">句子被拆断，<tspan font-weight="700">「修改」变成「修 改」</tspan></text>
  <text x="82" y="586" font-size="21" fill="#6b7684">→ 粘完还得手动删半天</text>

  <!-- ═══ 中间箭头 ═══ -->
  <text x="620" y="380" text-anchor="middle" font-size="52" fill="#2f81f7">➜</text>
  <text x="620" y="426" text-anchor="middle" font-size="19" font-weight="700" fill="#2f81f7">agent-copy-cjk</text>
  <text x="620" y="452" text-anchor="middle" font-size="16" fill="#8a94a0">复制时自动清理</text>

  <!-- ═══ 右卡片：装了工具（干净）═══ -->
  <rect x="695" y="150" width="490" height="470" rx="18" fill="#ffffff" stroke="#2da44e" stroke-width="2.5"/>
  <rect x="695" y="150" width="490" height="58" rx="18" fill="#e9f7ee"/>
  <rect x="695" y="180" width="490" height="28" fill="#e9f7ee"/>
  <text x="722" y="188" font-size="25" font-weight="700" fill="#1a7f37">✓　装了 agent-copy-cjk</text>

  <g font-size="24" fill="#2b3038" font-family="'SF Mono','PingFang SC',monospace">
    <text x="720" y="278">这个方案的关键在于我们可以</text>
    <text x="720" y="318">直接复用现成的机制，不需要</text>
    <text x="720" y="358"><tspan fill="#2da44e" font-weight="700">修改</tspan>任何设置就能生效。</text>
  </g>

  <line x1="722" y1="452" x2="1158" y2="452" stroke="#cdebd5" stroke-width="1.5"/>
  <text x="722" y="490" font-size="20" fill="#1a7f37">顶格干净 · 没有怪符号</text>
  <text x="722" y="524" font-size="20" fill="#1a7f37">句子完整，<tspan font-weight="700">「修改」还是「修改」</tspan></text>
  <text x="722" y="586" font-size="21" fill="#6b7684">→ 粘上就能用，不用管</text>

  <!-- ═══ 底部横幅 ═══ -->
  <rect x="55" y="668" width="1130" height="72" rx="16" fill="#1a1f26"/>
  <text x="620" y="714" text-anchor="middle" font-size="27" font-weight="600" fill="#ffffff">复制粘贴 AI 的中文回复，从此不用手动删空格、拼句子</text>
</svg>
