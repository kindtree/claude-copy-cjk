<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 430" font-family="'SF Mono', Menlo, Monaco, 'Noto Sans Mono CJK SC', 'Courier New', monospace">
  <defs>
    <clipPath id="paneL"><rect x="10" y="10" width="560" height="360" rx="12"/></clipPath>
    <clipPath id="paneR"><rect x="630" y="10" width="560" height="360" rx="12"/></clipPath>
  </defs>

  <!-- ══════════ LEFT PANE: before ══════════ -->
  <g clip-path="url(#paneL)">
    <rect x="10" y="10" width="560" height="360" rx="12" fill="#161b22"/>
    <rect x="10" y="10" width="560" height="38" fill="#21262d"/>
  </g>
  <rect x="10" y="10" width="560" height="360" rx="12" fill="none" stroke="#30363d" stroke-width="1.5"/>
  <circle cx="34" cy="29" r="6" fill="#ff5f57"/>
  <circle cx="54" cy="29" r="6" fill="#febc2e"/>
  <circle cx="74" cy="29" r="6" fill="#28c840"/>
  <text x="290" y="34" text-anchor="middle" font-size="13" fill="#8b949e">⌘C in Claude Code → paste</text>

  <g font-size="15" fill="#e6edf3">
    <text x="34" y="86"><tspan fill="#d29922">⏺</tspan> 修复方案如下：</text>
    <text x="34" y="140"><tspan fill="#f85149" opacity="0.55">··</tspan>这个方案的关键在于我们可以直接复用</text>
    <text x="34" y="167"><tspan fill="#f85149" opacity="0.55">··</tspan>Hammerspoon 的 eventtap 机制，不需要<tspan fill="#f85149" font-weight="bold">修</tspan></text>
    <text x="34" y="194"><tspan fill="#f85149" opacity="0.55">··</tspan><tspan fill="#f85149" font-weight="bold">改</tspan>任何系统设置就能生效。</text>
    <text x="34" y="248" fill="#8b949e" font-style="italic">✻ Worked for 11s</text>
    <text x="34" y="302" fill="#8b949e">✗ margins  ✗ ⏺ markers  ✗ spinner junk</text>
    <text x="34" y="329" fill="#8b949e">✗ hard-wrapped lines, <tspan fill="#f85149">修 改</tspan> torn apart</text>
  </g>

  <!-- ══════════ ARROW ══════════ -->
  <text x="600" y="200" text-anchor="middle" font-size="34" fill="#58a6ff">➜</text>

  <!-- ══════════ RIGHT PANE: after ══════════ -->
  <g clip-path="url(#paneR)">
    <rect x="630" y="10" width="560" height="360" rx="12" fill="#161b22"/>
    <rect x="630" y="10" width="560" height="38" fill="#21262d"/>
  </g>
  <rect x="630" y="10" width="560" height="360" rx="12" fill="none" stroke="#3fb950" stroke-width="1.5"/>
  <circle cx="654" cy="29" r="6" fill="#ff5f57"/>
  <circle cx="674" cy="29" r="6" fill="#febc2e"/>
  <circle cx="694" cy="29" r="6" fill="#28c840"/>
  <text x="910" y="34" text-anchor="middle" font-size="13" fill="#8b949e">⌘C with agent-copy-cjk → paste</text>

  <g font-size="15" fill="#e6edf3">
    <text x="654" y="86">修复方案如下：</text>
    <text x="654" y="140">这个方案的关键在于我们可以直接复用</text>
    <text x="654" y="167">Hammerspoon 的 eventtap 机制，不需要</text>
    <text x="654" y="194"><tspan fill="#3fb950" font-weight="bold">修改</tspan>任何系统设置就能生效。</text>
    <text x="654" y="248" fill="#8b949e" font-style="italic">(one clean paragraph — wraps rejoined)</text>
    <text x="654" y="302" fill="#8b949e">✓ flush-left  ✓ markers gone  ✓ chrome dropped</text>
    <text x="654" y="329" fill="#8b949e">✓ CJK-safe reflow, <tspan fill="#3fb950">修改</tspan> intact</text>
  </g>

  <!-- ══════════ FOOTER ══════════ -->
  <text x="600" y="412" text-anchor="middle" font-size="14" fill="#8b949e">Cmd+C is intercepted, scored, and cleaned before it reaches your clipboard — code, tables and lists survive untouched.</text>
</svg>
