<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" font-family="'SF Mono', Menlo, Monaco, 'Noto Sans Mono CJK SC', 'Courier New', monospace">
  <defs>
    <clipPath id="cpaneL"><rect x="10" y="10" width="560" height="360" rx="12"/></clipPath>
    <clipPath id="cpaneR"><rect x="630" y="10" width="560" height="360" rx="12"/></clipPath>
  </defs>

  <!-- ══════════ LEFT PANE: Codex before ══════════ -->
  <g clip-path="url(#cpaneL)">
    <rect x="10" y="10" width="560" height="360" rx="12" fill="#161b22"/>
    <rect x="10" y="10" width="560" height="38" fill="#21262d"/>
  </g>
  <rect x="10" y="10" width="560" height="360" rx="12" fill="none" stroke="#30363d" stroke-width="1.5"/>
  <circle cx="34" cy="29" r="6" fill="#ff5f57"/>
  <circle cx="54" cy="29" r="6" fill="#febc2e"/>
  <circle cx="74" cy="29" r="6" fill="#28c840"/>
  <text x="290" y="34" text-anchor="middle" font-size="13" fill="#8b949e">⌘C in Codex CLI → paste</text>

  <g font-size="15" fill="#e6edf3">
    <text x="34" y="86"><tspan fill="#d29922">•</tspan> 剪贴板工具能自动保存复制过的文字、图</text>
    <text x="34" y="113"><tspan fill="#f85149" opacity="0.55">··</tspan>片和链接，方便随时检索并再次粘贴。</text>
    <text x="34" y="167"><tspan fill="#f85149" opacity="0.55">··</tspan>- 借助 Hammerspoon 配置全局快捷键，随</text>
    <text x="34" y="194"><tspan fill="#f85149" opacity="0.55">····</tspan>时呼出剪贴板面板，完成搜索和快速粘</text>
    <text x="34" y="221"><tspan fill="#f85149" opacity="0.55">····</tspan>贴。</text>
    <text x="34" y="275" fill="#8b949e"><tspan fill="#d29922">›</tspan> Implement {feature}</text>
    <text x="34" y="329" fill="#8b949e">✗ • › markers  ✗ margins  ✗ hanging wraps</text>
  </g>

  <!-- ══════════ ARROW ══════════ -->
  <text x="600" y="200" text-anchor="middle" font-size="34" fill="#58a6ff">➜</text>

  <!-- ══════════ RIGHT PANE: after ══════════ -->
  <g clip-path="url(#cpaneR)">
    <rect x="630" y="10" width="560" height="360" rx="12" fill="#161b22"/>
    <rect x="630" y="10" width="560" height="38" fill="#21262d"/>
  </g>
  <rect x="630" y="10" width="560" height="360" rx="12" fill="none" stroke="#3fb950" stroke-width="1.5"/>
  <circle cx="654" cy="29" r="6" fill="#ff5f57"/>
  <circle cx="674" cy="29" r="6" fill="#febc2e"/>
  <circle cx="694" cy="29" r="6" fill="#28c840"/>
  <text x="910" y="34" text-anchor="middle" font-size="13" fill="#8b949e">⌘C with agent-copy-cjk → paste</text>

  <g font-size="15" fill="#e6edf3">
    <text x="654" y="86">剪贴板工具能自动保存复制过的文字、图片</text>
    <text x="654" y="113">和链接，方便随时检索并再次粘贴。</text>
    <text x="654" y="167">- 借助 Hammerspoon 配置全局快捷键，随时</text>
    <text x="654" y="194">呼出剪贴板面板，完成搜索和快速粘贴。</text>
    <text x="654" y="248" fill="#8b949e" font-style="italic">(each list item back on one clean line)</text>
    <text x="654" y="329" fill="#8b949e">✓ markers gone  ✓ flush-left  ✓ lists rejoined</text>
  </g>

  <!-- ══════════ FOOTER ══════════ -->
  <text x="600" y="394" text-anchor="middle" font-size="14" fill="#8b949e">Verified against a real Codex CLI v0.144.1 render — the capture is a test fixture in this repo.</text>
</svg>
